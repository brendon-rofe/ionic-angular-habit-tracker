<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Stats</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--overflow:auto;">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Stats</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">Current streak</div>
      <div class="stat-value">{{ sStreak }}</div>
      <div class="stat-sub">days</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best streak</div>
      <div class="stat-value">{{ sBest }}</div>
      <div class="stat-sub">days</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This week</div>
      <div class="stat-value">{{ sWeek }}</div>
      <div class="stat-sub">completion</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total habits</div>
      <div class="stat-value">{{ sTotal }}</div>
      <div class="stat-sub">active</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Last 7 days</div>
    <div style="position:relative;height:120px;">
      <canvas id="weekly-chart" role="img" aria-label="Bar chart of daily completion over last 7 days"></canvas>
    </div>
  </div>

  <div class="chart-card" style="margin-bottom:80px;">
    <div class="chart-title">Per habit — this week</div>
    <div id="per-habit-bars">
      <div class="per-habit-row" *ngFor="let bar of perHabitBars">
        <div class="per-habit-name">{{ bar.name }}</div>
        <div class="per-habit-track"><div class="per-habit-fill" [style.width.%]="bar.pct"></div></div>
        <div class="per-habit-pct">{{ bar.pct }}%</div>
      </div>
    </div>
  </div>
</ion-content>

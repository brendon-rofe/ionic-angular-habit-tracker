<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Today</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Today</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="date-row">{{ todayDate }}</div>

  <div class="progress-row">
    <div class="progress-label">{{ progressLabel }}</div>
    <div class="progress-track"><div class="progress-fill" [style.width.%]="progressPct"></div></div>
  </div>

  <div id="today-list">
    <div class="habit-item" *ngFor="let habit of habits" (click)="toggleHabit(habit.id)">
      <div class="check" [class.done]="habit.completed">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div style="flex:1">
        <div class="habit-name" [class.done]="habit.completed">{{ habit.name }}</div>
        <div class="habit-freq-text">{{ habit.freq }}</div>
      </div>
    </div>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed" *ngIf="!isModalOpen">
    <ion-fab-button (click)="openModal()">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <line x1="11" y1="6" x2="11" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="6" y1="11" x2="16" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </ion-fab-button>
  </ion-fab>

  <div class="modal-backdrop" [class.open]="isModalOpen" (click)="closeModal()">
    <div class="modal-sheet" (click)="$event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-btn modal-cancel" (click)="closeModal()">Cancel</button>
        <span class="modal-title">New habit</span>
        <button class="modal-btn modal-save" [disabled]="!newHabitName || newHabitName.trim().length < 2" (click)="saveFromToday()">Add</button>
      </div>
      <div class="modal-field">
        <label>Habit name</label>
        <input id="today-name-input" type="text" placeholder="e.g. Morning walk" [(ngModel)]="newHabitName"/>
      </div>
      <div class="modal-field">
        <label>Frequency</label>
        <select id="today-freq-input" [(ngModel)]="newHabitFreq">
          <option>Daily</option>
          <option>Weekdays</option>
          <option>Weekends</option>
          <option>Weekly</option>
        </select>
      </div>
    </div>
  </div>
</ion-content>

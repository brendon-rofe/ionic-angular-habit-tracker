<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Habits</ion-title>
    <button slot="end" class="edit-btn" (click)="toggleEdit()">{{ editMode ? 'Done' : 'Edit' }}</button>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Habits</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="section-hdr">Your habits</div>

  <div id="habits-list">
    @for (habit of habits; track habit.id) {
      <div class="habit-card">
        @if (editMode) {
          <div class="del-circle" (click)="deleteHabit(habit.id)">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <line x1="2" y1="5" x2="8" y2="5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
        }
        <span class="habit-name">{{ habit.name }}</span>
        <span class="freq-pill {{ habit.freq }}">{{ habit.freq }}</span>
        <svg class="chevron-icon" viewBox="0 0 14 14" fill="none" (click)="openModal(habit.id)">
          <polyline points="5,3 9,7 5,11" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    }
  </div>

  @if (!isModalOpen) {
    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button (click)="openModal()">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <line x1="11" y1="6" x2="11" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="6" y1="11" x2="16" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </ion-fab-button>
    </ion-fab>
  }

  @if (isModalOpen) {
    <div class="modal-backdrop open" (click)="closeModal()">
      <div class="modal-sheet" (click)="$event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <button class="modal-btn modal-cancel" (click)="closeModal()">Cancel</button>
          <span class="modal-title">{{ editingId !== null ? 'Edit habit' : 'New habit' }}</span>
          <button class="modal-btn modal-save" [disabled]="!newHabitName || newHabitName.trim().length < 2" (click)="saveHabit()">Save</button>
        </div>
        <div class="modal-field">
          <label>Habit name</label>
          <input type="text" placeholder="e.g. Morning walk" [(ngModel)]="newHabitName"/>
        </div>
        <div class="modal-field">
          <label>Frequency</label>
          <select [(ngModel)]="newHabitFreq">
            <option>Daily</option>
            <option>Weekdays</option>
            <option>Weekends</option>
            <option>Weekly</option>
          </select>
        </div>
      </div>
    </div>
  }
</ion-content>

<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <svg class="tab-icon" viewBox="0 0 22 22" fill="none">
        <rect x="4" y="4" width="14" height="14" rx="2" class="ti-today-rect" stroke-width="1.4"/>
        <line x1="7" y1="8" x2="15" y2="8" class="ti-today-l1" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="7" y1="11" x2="15" y2="11" class="ti-today-l2" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="7" y1="14" x2="12" y2="14" class="ti-today-l3" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <ion-label>Today</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <svg class="tab-icon" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="7" class="ti-habits-c" stroke-width="1.4"/>
        <polyline points="8,11 10,13 14,9" class="ti-habits-p" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <ion-label>Habits</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <svg class="tab-icon" viewBox="0 0 22 22" fill="none">
        <rect x="4" y="12" width="4" height="6" rx="1" class="ti-stats-r1" stroke-width="1.4"/>
        <rect x="9" y="8" width="4" height="10" rx="1" class="ti-stats-r2" stroke-width="1.4"/>
        <rect x="14" y="5" width="4" height="13" rx="1" class="ti-stats-r3" stroke-width="1.4"/>
      </svg>
      <ion-label>Stats</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>


<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body, div, span, p { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.phone { background: #f1efe8; border-radius: 40px; border: 1.5px solid #888780; width: 320px; margin: 1rem auto; overflow: hidden; }
.statusbar { background: #ffffff; padding: 10px 20px 4px; display: flex; justify-content: space-between; font-size: 11px; color: #5f5e5a; }
.toolbar { background: #ffffff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 10px 16px 12px; display: flex; align-items: center; justify-content: space-between; min-height: 48px; }
.toolbar h1 { font-size: 17px; font-weight: 500; color: #1a1a1a; }
.screen { display: none; }
.screen.active { display: block; }
.content { background: #f5f5f0; min-height: 430px; position: relative; overflow: hidden; }
.tabbar { background: #ffffff; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; }
.tab { flex: 1; padding: 10px 0 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.tab-label { font-size: 10px; color: #888780; }
.tab.active .tab-label { color: #1D9E75; }
.tab-icon { width: 22px; height: 22px; }
.fab { position: absolute; bottom: 16px; right: 16px; width: 48px; height: 48px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; z-index: 10; }
.fab span { color: #ffffff; font-size: 26px; line-height: 1; margin-top: -2px; }
.habit-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.08); background: #ffffff; cursor: pointer; user-select: none; }
.check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.25); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.check.done { background: #1D9E75; border-color: #1D9E75; }
.check svg { display: none; }
.check.done svg { display: block; }
.habit-name { font-size: 15px; color: #1a1a1a; flex: 1; }
.habit-name.done { color: #888780; text-decoration: line-through; }
.habit-freq-text { font-size: 12px; color: #b4b2a9; }
.date-row { background: #ffffff; padding: 8px 16px 4px; font-size: 13px; color: #5f5e5a; }
.progress-row { background: #ffffff; padding: 6px 16px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
.progress-label { font-size: 12px; color: #5f5e5a; margin-bottom: 6px; }
.progress-track { background: rgba(0,0,0,0.08); border-radius: 3px; height: 6px; }
.progress-fill { background: #1D9E75; border-radius: 3px; height: 6px; transition: width 0.3s; }
.section-hdr { font-size: 12px; color: #5f5e5a; padding: 12px 16px 6px; text-transform: uppercase; letter-spacing: 0.05em; background: #f5f5f0; }
.habit-card { background: #ffffff; border-bottom: 0.5px solid rgba(0,0,0,0.08); display: flex; align-items: center; padding: 13px 16px; gap: 12px; cursor: pointer; }
.freq-pill { font-size: 11px; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
.freq-pill.Daily { background: #E1F5EE; color: #0F6E56; }
.freq-pill.Weekdays { background: #E6F1FB; color: #185FA5; }
.freq-pill.Weekends { background: #FAEEDA; color: #854F0B; }
.freq-pill.Weekly { background: #EEEDFE; color: #534AB7; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px; background: #f5f5f0; }
.stat-card { background: #ebe9e2; border-radius: 8px; padding: 12px; }
.stat-label { font-size: 11px; color: #5f5e5a; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; color: #1a1a1a; }
.stat-sub { font-size: 11px; color: #888780; margin-top: 2px; }
.chart-card { background: #ffffff; margin: 0 16px 12px; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 14px; }
.chart-title { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 10px; }
.per-habit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.per-habit-name { font-size: 12px; color: #5f5e5a; width: 100px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.per-habit-track { flex: 1; background: rgba(0,0,0,0.08); border-radius: 3px; height: 8px; }
.per-habit-fill { background: #1D9E75; border-radius: 3px; height: 8px; }
.per-habit-pct { font-size: 11px; color: #888780; width: 28px; text-align: right; flex-shrink: 0; }
.modal-backdrop { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); align-items: flex-end; z-index: 20; }
.modal-backdrop.open { display: flex; }
.modal-sheet { background: #ffffff; border-radius: 16px 16px 0 0; width: 100%; padding: 0 0 20px; }
.modal-handle { width: 36px; height: 4px; background: rgba(0,0,0,0.2); border-radius: 2px; margin: 10px auto 0; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
.modal-title { font-size: 16px; font-weight: 500; color: #1a1a1a; }
.modal-btn { background: none; border: none; font-size: 14px; cursor: pointer; padding: 4px 0; }
.modal-cancel { color: #888780; }
.modal-save { color: #1D9E75; font-weight: 500; }
.modal-save:disabled { color: #b4b2a9; }
.modal-field { padding: 10px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
.modal-field label { display: block; font-size: 11px; color: #5f5e5a; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.modal-field input, .modal-field select { width: 100%; background: none; border: none; font-size: 15px; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; outline: none; padding: 0; }
.edit-btn { font-size: 13px; color: #1D9E75; cursor: pointer; background: none; border: none; }
.del-circle { width: 20px; height: 20px; border-radius: 50%; background: #E24B4A; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
</style>

<div class="phone">
  <div class="statusbar"><span>9:41</span><span>100%</span></div>

  <div id="screen-today" class="screen active">
    <div class="toolbar"><h1>Today</h1></div>
    <div class="content">
      <div class="date-row" id="today-date"></div>
      <div class="progress-row">
        <div class="progress-label" id="prog-label">0 of 0 completed</div>
        <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div id="today-list"></div>
      <button class="fab" onclick="openModal(null,'today')"><span>+</span></button>
      <div class="modal-backdrop" id="today-modal">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <button class="modal-btn modal-cancel" onclick="closeModal('today')">Cancel</button>
            <span class="modal-title">New habit</span>
            <button class="modal-btn modal-save" id="today-save-btn" onclick="saveFromToday()" disabled>Add</button>
          </div>
          <div class="modal-field"><label>Habit name</label><input id="today-name-input" type="text" placeholder="e.g. Morning walk" oninput="document.getElementById('today-save-btn').disabled=this.value.trim().length<2"/></div>
          <div class="modal-field"><label>Frequency</label><select id="today-freq-input"><option>Daily</option><option>Weekdays</option><option>Weekends</option><option>Weekly</option></select></div>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-habits" class="screen">
    <div class="toolbar">
      <h1>Habits</h1>
      <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">Edit</button>
    </div>
    <div class="content">
      <div class="section-hdr">Your habits</div>
      <div id="habits-list"></div>
      <button class="fab" onclick="openModal(null,'habits')"><span>+</span></button>
      <div class="modal-backdrop" id="habits-modal">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <button class="modal-btn modal-cancel" onclick="closeModal('habits')">Cancel</button>
            <span class="modal-title" id="habits-modal-title">New habit</span>
            <button class="modal-btn modal-save" id="habits-save-btn" onclick="saveFromHabits()" disabled>Save</button>
          </div>
          <div class="modal-field"><label>Habit name</label><input id="habits-name-input" type="text" placeholder="e.g. Morning walk" oninput="document.getElementById('habits-save-btn').disabled=this.value.trim().length<2"/></div>
          <div class="modal-field"><label>Frequency</label><select id="habits-freq-input"><option>Daily</option><option>Weekdays</option><option>Weekends</option><option>Weekly</option></select></div>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-stats" class="screen">
    <div class="toolbar"><h1>Stats</h1></div>
    <div class="content" style="overflow-y:auto;max-height:430px;">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Current streak</div><div class="stat-value">12</div><div class="stat-sub">days</div></div>
        <div class="stat-card"><div class="stat-label">Best streak</div><div class="stat-value">21</div><div class="stat-sub">days</div></div>
        <div class="stat-card"><div class="stat-label">This week</div><div class="stat-value" id="s-week">0%</div><div class="stat-sub">completion</div></div>
        <div class="stat-card"><div class="stat-label">Total habits</div><div class="stat-value" id="s-total">5</div><div class="stat-sub">active</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Last 7 days</div>
        <div style="position:relative;height:120px;"><canvas id="weekly-chart" role="img" aria-label="Bar chart of daily completion over last 7 days"></canvas></div>
      </div>
      <div class="chart-card" style="margin-bottom:80px;">
        <div class="chart-title">Per habit — this week</div>
        <div id="per-habit-bars"></div>
      </div>
    </div>
  </div>

  <div class="tabbar">
    <div class="tab active" id="tab-today" onclick="switchTab('today')">
      <svg class="tab-icon" viewBox="0 0 22 22" fill="none">
        <rect x="4" y="4" width="14" height="14" rx="2" id="ti-today-rect" stroke="#1D9E75" stroke-width="1.4"/>
        <line x1="7" y1="8" x2="15" y2="8" id="ti-today-l1" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="7" y1="11" x2="15" y2="11" id="ti-today-l2" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="7" y1="14" x2="12" y2="14" id="ti-today-l3" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span class="tab-label" id="tl-today" style="color:#1D9E75;">Today</span>
    </div>
    <div class="tab" id="tab-habits" onclick="switchTab('habits')">
      <svg class="tab-icon" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="7" id="ti-habits-c" stroke="#888780" stroke-width="1.4"/>
        <polyline id="ti-habits-p" points="8,11 10,13 14,9" stroke="#888780" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="tab-label" id="tl-habits">Habits</span>
    </div>
    <div class="tab" id="tab-stats" onclick="switchTab('stats')">
      <svg class="tab-icon" viewBox="0 0 22 22" fill="none">
        <rect x="4" y="12" width="4" height="6" rx="1" id="ti-stats-r1" stroke="#888780" stroke-width="1.4"/>
        <rect x="9" y="8" width="4" height="10" rx="1" id="ti-stats-r2" stroke="#888780" stroke-width="1.4"/>
        <rect x="14" y="5" width="4" height="13" rx="1" id="ti-stats-r3" stroke="#888780" stroke-width="1.4"/>
      </svg>
      <span class="tab-label" id="tl-stats">Stats</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let habits = [
  { id:1, name:'Morning walk', freq:'Daily', completed:false },
  { id:2, name:'Read for 20 mins', freq:'Daily', completed:false },
  { id:3, name:'Drink 2L of water', freq:'Daily', completed:false },
  { id:4, name:'Meditate', freq:'Weekdays', completed:false },
  { id:5, name:'Evening stretch', freq:'Weekends', completed:false },
];
let nextId = 6, editMode = false, editingId = null, weeklyChart = null;
const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const today = new Date();
const weekData = [65,80,100,55,90,70,40];

function fmt(d){ return d.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'}); }

function switchTab(name) {
  ['today','habits','stats'].forEach(t => {
    document.getElementById('screen-'+t).classList.toggle('active', t===name);
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
  });
  const G='#1D9E75', N='#888780';
  const setStroke = (ids, color) => ids.forEach(id => { const el=document.getElementById(id); if(el) el.setAttribute('stroke', color); });
  setStroke(['ti-today-rect','ti-today-l1','ti-today-l2','ti-today-l3'], name==='today'?G:N);
  setStroke(['ti-habits-c','ti-habits-p'], name==='habits'?G:N);
  setStroke(['ti-stats-r1','ti-stats-r2','ti-stats-r3'], name==='stats'?G:N);
  ['today','habits','stats'].forEach(t => {
    document.getElementById('tl-'+t).style.color = t===name ? G : '#888780';
  });
  if (name==='stats') renderStats();
}

function renderToday() {
  document.getElementById('today-date').textContent = fmt(today);
  const list = document.getElementById('today-list');
  list.innerHTML = habits.map(h => `
    <div class="habit-item" onclick="toggleHabit(${h.id})">
      <div class="check ${h.completed?'done':''}">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div style="flex:1">
        <div class="habit-name ${h.completed?'done':''}">${h.name}</div>
        <div class="habit-freq-text">${h.freq}</div>
      </div>
    </div>
  `).join('');
  const done = habits.filter(h=>h.completed).length;
  const pct = habits.length ? Math.round((done/habits.length)*100) : 0;
  document.getElementById('prog-label').textContent = `${done} of ${habits.length} completed`;
  document.getElementById('prog-fill').style.width = pct+'%';
}

function toggleHabit(id) {
  const h = habits.find(h=>h.id===id);
  if(h) h.completed = !h.completed;
  renderToday();
}

function renderHabits() {
  const list = document.getElementById('habits-list');
  list.innerHTML = habits.map(h => `
    <div class="habit-card">
      ${editMode ? `<div class="del-circle" onclick="deleteHabit(${h.id})"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><line x1="2" y1="5" x2="8" y2="5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>` : ''}
      <span style="flex:1;font-size:15px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${h.name}</span>
      <span class="freq-pill ${h.freq}">${h.freq}</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="cursor:pointer;flex-shrink:0;" onclick="openModal(${h.id},'habits')">
        <polyline points="5,3 9,7 5,11" stroke="#888780" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `).join('');
}

function deleteHabit(id) {
  habits = habits.filter(h=>h.id!==id);
  renderHabits(); renderToday();
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('edit-btn').textContent = editMode ? 'Done' : 'Edit';
  renderHabits();
}

function renderStats() {
  document.getElementById('s-total').textContent = habits.length;
  const done = habits.filter(h=>h.completed).length;
  document.getElementById('s-week').textContent = (habits.length ? Math.round((done/habits.length)*100) : 0)+'%';
  document.getElementById('per-habit-bars').innerHTML = habits.map(h => {
    const p = Math.round(50 + Math.random()*50);
    return `<div class="per-habit-row">
      <div class="per-habit-name">${h.name}</div>
      <div class="per-habit-track"><div class="per-habit-fill" style="width:${p}%"></div></div>
      <div class="per-habit-pct">${p}%</div>
    </div>`;
  }).join('');
  if (weeklyChart) { weeklyChart.destroy(); weeklyChart = null; }
  const ctx = document.getElementById('weekly-chart');
  if (!ctx) return;
  const lastDays = Array.from({length:7},(_,i)=>{ const d=new Date(today); d.setDate(d.getDate()-6+i); return days[d.getDay()]; });
  weeklyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: lastDays,
      datasets: [{ data: weekData, backgroundColor: weekData.map((_,i)=>i===6?'#1D9E75':'#9FE1CB'), borderRadius: 4, barPercentage: 0.6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#5f5e5a', font: { size: 11 } }, grid: { display: false }, border: { display: false } },
        y: { min:0, max:100, ticks: { color: '#5f5e5a', font: { size: 11 }, callback: v=>v+'%', stepSize: 50 }, grid: { color: 'rgba(0,0,0,0.06)' }, border: { display: false } }
      }
    }
  });
}

function openModal(id, screen) {
  editingId = id;
  const h = id ? habits.find(h=>h.id===id) : null;
  if (screen==='today') {
    document.getElementById('today-name-input').value = '';
    document.getElementById('today-save-btn').disabled = true;
    document.getElementById('today-modal').classList.add('open');
    setTimeout(()=>document.getElementById('today-name-input').focus(),50);
  } else {
    document.getElementById('habits-modal-title').textContent = h ? 'Edit habit' : 'New habit';
    document.getElementById('habits-name-input').value = h ? h.name : '';
    document.getElementById('habits-freq-input').value = h ? h.freq : 'Daily';
    document.getElementById('habits-save-btn').disabled = !h;
    document.getElementById('habits-modal').classList.add('open');
    setTimeout(()=>document.getElementById('habits-name-input').focus(),50);
  }
}

function closeModal(screen) {
  document.getElementById(screen+'-modal').classList.remove('open');
  editingId = null;
}

function saveFromToday() {
  const name = document.getElementById('today-name-input').value.trim();
  const freq = document.getElementById('today-freq-input').value;
  if (name.length < 2) return;
  habits.push({ id: nextId++, name, freq, completed: false });
  closeModal('today'); renderToday(); renderHabits();
}

function saveFromHabits() {
  const name = document.getElementById('habits-name-input').value.trim();
  const freq = document.getElementById('habits-freq-input').value;
  if (name.length < 2) return;
  if (editingId) {
    const h = habits.find(h=>h.id===editingId);
    if (h) { h.name=name; h.freq=freq; }
  } else {
    habits.push({ id: nextId++, name, freq, completed: false });
  }
  closeModal('habits'); renderHabits(); renderToday();
}

renderToday();
renderHabits();
</script>
